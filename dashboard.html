<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mamifs Future Tech Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#0b0f1a;color:#fff;}
header{background:#001f3f;padding:20px;text-align:center;font-size:24px;}
.container{padding:20px;}
table{width:100%;border-collapse:collapse;background:#111827;border-radius:10px;overflow:hidden;}
th,td{padding:12px;text-align:left;border-bottom:1px solid #333;}
th{background:#0A66C2;}
tr:hover{background:#1f2937;}
button{padding:5px 10px;border:none;border-radius:5px;background:#0A66C2;color:white;cursor:pointer;}
</style>
</head>
<body>

<header>
Mamifs Future Tech - Student Dashboard
</header>

<div class="container">

<h2>Registered Students</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Course</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="studentTable">
</tbody>
</table>

</div>

<script>
const sheetURL = "YOUR_CSV_LINK";

async function loadStudents() {
  const res = await fetch(sheetURL);
  const data = await res.text();

  const rows = data.split("\n").slice(1);
  const table = document.getElementById("studentTable");
  table.innerHTML = "";

  rows.forEach(row => {
    const cols = row.split(",");
    if(cols.length > 1){
      table.innerHTML += `
        <tr>
          <td>${cols[0]}</td>
          <td>${cols[1]}</td>
          <td>${cols[2]}</td>
          <td>${cols[3]}</td>
          <td>${cols[4] || "Pending"}</td>
          <td>-</td>
        </tr>
      `;
    }
  });
}

loadStudents();
</script>
</body>
</html>
