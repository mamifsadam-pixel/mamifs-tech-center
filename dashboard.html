<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mamifs Future Tech Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#0b0f1a;color:#fff;}
header{background:#001f3f;padding:20px;text-align:center;font-size:24px;}
.container{padding:20px;}
table{width:100%;border-collapse:collapse;background:#111827;border-radius:10px;overflow:hidden;}
th,td{padding:12px;text-align:left;border-bottom:1px solid #333;}
th{background:#0A66C2;}
tr:hover{background:#1f2937;}
button{padding:5px 10px;border:none;border-radius:5px;background:#0A66C2;color:white;cursor:pointer;}
</style>
</head>
<body>

<header>
Mamifs Future Tech - Student Dashboard
</header>

<div class="container">

<h2>Registered Students</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Course</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="studentTable">
</tbody>
</table>

</div>

<script>

// Example demo data
let students = [
{name:"John Doe",email:"john@email.com",phone:"123456",course:"Web Development",status:"Pending"},
{name:"Fatime",email:"fatime@email.com",phone:"69900675",course:"English",status:"Paid"}
];

function loadStudents(){
let table = document.getElementById("studentTable");
table.innerHTML = "";
students.forEach((s,index)=>{
let row = `<tr>
<td>${s.name}</td>
<td>${s.email}</td>
<td>${s.phone}</td>
<td>${s.course}</td>
<td>${s.status}</td>
<td><button onclick="markPaid(${index})">Mark Paid</button></td>
</tr>`;
table.innerHTML += row;
});
}

function markPaid(i){
students[i].status = "Paid";
loadStudents();
}

loadStudents();

</script>

</body>
</html>
